server:
  port: 8081

spring:
  application:
    name: auth-service

  # CHANGED: H2 → MySQL (taken from Auth/application.properties)
  datasource:
    url: jdbc:mysql://localhost:3306/iso8583_auth?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # ADDED: Mail config (from Auth/application.properties)
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com      # ← change this
    password: your-app-password          # ← change this (Gmail App Password)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000
  refresh-expiration: 604800000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoint:
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.example: DEBUG