server.port=8080
spring.application.name=wearables-backend

# ?? H2 In-Memory Database ?????????????????????????????????????????????????????
spring.datasource.url=jdbc:h2:mem:wearablesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console at http://localhost:8080/h2-console  (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ?? Flyway ????????????????????????????????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ?? Actuator ??????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ?? CORS (shell :4200, wearables-standalone :4206) ????????????????????????????
app.cors.allowed-origins=http://localhost:4200,http://localhost:4206