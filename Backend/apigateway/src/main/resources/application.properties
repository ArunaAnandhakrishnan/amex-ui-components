spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ? ADD ? disables caffeine cache requirement, avoids NoSuchBeanDefinitionException
spring.cloud.loadbalancer.cache.enabled=false

# JWT secret
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=wearables-service
spring.cloud.gateway.routes[1].uri=lb://wearables-backend
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/wearables/**

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200,http://localhost:4206
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# Actuator
management.endpoints.web.exposure.include=health,info
# Actuator-specific CORS (served by the gateway itself, not proxied)
management.endpoints.web.cors.allowed-origins=http://localhost:4200,http://localhost:4206
management.endpoints.web.cors.allowed-methods=GET,POST,OPTIONS
management.endpoints.web.cors.allowed-headers=*