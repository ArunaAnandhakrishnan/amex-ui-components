spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT secret ? must match auth-service exactly
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# ?? Routes ????????????????????????????????????????????????????????????????????

# 1. Auth service (public ? no JWT filter needed, gateway passes through)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 2. Wearables service ? protected (JWT filter runs automatically as GlobalFilter)
spring.cloud.gateway.routes[1].id=wearables-service
spring.cloud.gateway.routes[1].uri=lb://wearables-backend
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/wearables/**

# Add more services here as you build them:
# spring.cloud.gateway.routes[2].id=oms-service
# spring.cloud.gateway.routes[2].uri=lb://oms-service
# spring.cloud.gateway.routes[2].predicates[0]=Path=/api/oms/**

# ?? CORS ??????????????????????????????????????????????????????????????????????
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000,http://localhost:4200,http://localhost:4206
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ?? Actuator ??????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info